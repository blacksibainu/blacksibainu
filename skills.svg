      .lang { font-family: monospace; font-size: 12px; fill: #c9d1d9; font-weight: 600; }
      .pct { font-family: monospace; font-size: 11px; fill: #7b8ab8; }
    </style>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

